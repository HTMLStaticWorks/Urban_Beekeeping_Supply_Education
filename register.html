<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for Urban Hive Membership.">
    <title>Register | Urban Hive</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        /* Unique Page Animation: Slide-up */
        body {
            min-height: 100vh;
            overflow-y: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 120px;
            padding-bottom: 60px;
            background: var(--bg-color);
        }

        .register-card {
            background-color: var(--card-bg);
            border-radius: 40px;
            width: 100%;
            max-width: 540px;
            padding: 64px;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.1);
            transform: translateY(100%);
            opacity: 0;
            animation: slideUpIn 1s forwards cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes slideUpIn {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .brand-logo-fixed {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 1000;
        }

        .form-control {
            padding: 16px;
            border-radius: 12px;
            background-color: rgba(31, 122, 99, 0.05);
            border: 1px solid var(--border-color);
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-hexagon-fill fs-3 text-secondary me-2"></i>
                <span class="brand-name text-secondary">URBAN HIVE</span>
            </a>

            <div class="d-flex align-items-center order-lg-3">
                <button class="theme-toggle-btn me-3" aria-label="Toggle Theme">
                    <i class="bi bi-moon-fill"></i>
                </button>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
                <div class="offcanvas-header border-bottom">
                    <h5 class="offcanvas-title brand-name text-secondary">URBAN HIVE</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-center flex-grow-1 pe-3">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="home-2.html">Impact</a></li>
                        <li class="nav-item"><a class="nav-link" href="services.html">Shop</a></li>
                        <li class="nav-item"><a class="nav-link" href="pricing.html">Courses</a></li>
                        <li class="nav-item"><a class="nav-link" href="booking.html">Booking</a></li>
                        <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
                        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container d-flex justify-content-center">
        <div class="register-card">
            <h2 class="mb-4 fw-bold">Join the Urban Movement</h2>
            <p class="text-muted mb-5">Start your journey to sustainable city beekeeping.</p>

            <form action="dashboard.html" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="row g-3">
                    <div class="col-md-6 mb-3">
                        <label class="form-label small fw-bold">FIRST NAME</label>
                        <input type="text" class="form-control" placeholder="Jane" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label small fw-bold">LAST NAME</label>
                        <input type="text" class="form-control" placeholder="Smith" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">EMAIL ADDRESS</label>
                    <input type="email" class="form-control" placeholder="jane@example.com" required>
                </div>
                <div class="mb-5">
                    <label class="form-label small fw-bold">PASSWORD</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-secondary w-100 rounded-pill mb-4 py-3 fw-bold">Create
                    Account</button>
                <p class="text-center small text-muted">Already have an account? <a href="login.html"
                        class="text-primary fw-bold text-decoration-none">Login</a></p>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
