<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Urban Hive Dashboard.">
    <title>Login | Urban Hive</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        /* Unique Page Animation: Glass Morphism Blur Reveal */
        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(31, 122, 99, 0.4), rgba(31, 122, 99, 0.4)), url('assets/img/hero.png');
            background-size: cover;
            background-position: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            width: 100%;
            max-width: 480px;
            padding: 64px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: scale(0.9);
            animation: glassReveal 0.8s forwards cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        [data-bs-theme="dark"] .login-card {
            background: rgba(22, 39, 35, 0.4);
            border-color: rgba(255, 255, 255, 0.05);
        }

        @keyframes glassReveal {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white !important;
            padding: 16px;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .btn-primary {
            padding: 16px;
            font-weight: 700;
        }

        .theme-toggle-fixed {
            position: fixed;
            top: 40px;
            right: 40px;
            z-index: 1000;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top border-0 bg-transparent">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-hexagon-fill fs-3 text-primary me-2"></i>
                <span class="brand-name text-white">URBAN HIVE</span>
            </a>

            <div class="d-flex align-items-center order-lg-3">
                <button class="theme-toggle-btn text-white me-3" aria-label="Toggle Theme">
                    <i class="bi bi-moon-fill"></i>
                </button>
                <button class="navbar-toggler text-white" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar">
                    <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
                </button>
            </div>

            <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
                <div class="offcanvas-header border-bottom">
                    <h5 class="offcanvas-title brand-name text-secondary">URBAN HIVE</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-center flex-grow-1 pe-3">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="home-2.html">Impact</a></li>
                        <li class="nav-item"><a class="nav-link" href="services.html">Shop</a></li>
                        <li class="nav-item"><a class="nav-link" href="pricing.html">Courses</a></li>
                        <li class="nav-item"><a class="nav-link" href="booking.html">Booking</a></li>
                        <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                        <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
                        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container d-flex justify-content-center">
        <div class="login-card text-center text-white">
            <a href="index.html" class="d-flex align-items-center justify-content-center text-decoration-none mb-5">
                <i class="bi bi-hexagon-fill fs-1 text-primary me-2"></i>
                <h2 class="brand-name mb-0 text-white">URBAN HIVE</h2>
            </a>
            <h3 class="mb-4 fw-bold">Welcome Back</h3>
            <p class="opacity-75 mb-5">Access your urban apiary management.</p>

            <form action="dashboard.html" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="mb-4 text-start">
                    <label class="form-label small fw-bold">EMAIL ADDRESS</label>
                    <input type="email" class="form-control" placeholder="name@email.com" required>
                </div>
                <div class="mb-5 text-start">
                    <label class="form-label small fw-bold">PASSWORD</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill mb-4">Login to Dashboard</button>
                <p class="small opacity-75">Don't have an account? <a href="register.html"
                        class="text-primary fw-bold text-decoration-none">Sign up</a></p>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
