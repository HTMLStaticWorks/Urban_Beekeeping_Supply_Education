<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Urban Hive Dashboard.">
    <title>Login | Urban Hive</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%23FFFF00'><path d='M8.5.134a1 1 0 0 0-1 0l-6 3.464a1 1 0 0 0-.5.866V11.54a1 1 0 0 0 .5.866l6 3.464a1 1 0 0 0 1 0l6-3.464a1 1 0 0 0 .5-.866V4.464a1 1 0 0 0-.5-.866L8.5.134z'/></svg>">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        /* Unique Page Animation: Glass Morphism Blur Reveal */
        body {
            min-height: 100vh;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(14, 26, 23, 0.85), rgba(14, 26, 23, 0.85)), url('assets/img/hero.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            width: 100%;
            max-width: 480px;
            padding: 48px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(20px);
            animation: glassReveal 0.8s forwards cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes glassReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-logo-icon {
            color: var(--primary-color);
            filter: drop-shadow(0 0 10px rgba(255, 255, 0, 0.3));
        }

        .brand-name {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            letter-spacing: 1px;
            color: white;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white !important;
            padding: 14px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(255, 255, 0, 0.15);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-primary {
            padding: 14px;
            font-weight: 700;
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: var(--accent-color);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #e6a700;
            border-color: #e6a700;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 0, 0.2);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: var(--accent-color);
            transform: translateY(-3px);
        }

        .forgot-password {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            position: relative;
        }

        .forgot-password:hover,
        .login-card p a:hover {
            color: var(--primary-color);
            text-decoration: underline !important;
            text-underline-offset: 4px;
        }

        .btn-primary {
            padding: 14px 24px;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(255, 255, 0, 0.2);
            color: var(--accent-color) !important;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        .theme-toggle-fixed {
            position: fixed;
            top: 40px;
            right: 40px;
            z-index: 1000;
        }

        /* Light Theme Overrides */
        [data-bs-theme="light"] body {
            background: linear-gradient(rgba(240, 245, 243, 0.94), rgba(240, 245, 243, 0.94)), url('assets/img/hero.png');
            background-size: cover;
            background-attachment: fixed;
        }

        [data-bs-theme="light"] .login-card {
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        [data-bs-theme="light"] .brand-name,
        [data-bs-theme="light"] .login-card h3,
        [data-bs-theme="light"] .login-card p,
        [data-bs-theme="light"] .form-label,
        [data-bs-theme="light"] .login-card .small,
        [data-bs-theme="light"] .forgot-password {
            color: #1a1a1a !important;
        }

        [data-bs-theme="light"] .form-control {
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.12);
            color: #333 !important;
        }

        [data-bs-theme="light"] .form-control::placeholder {
            color: rgba(0, 0, 0, 0.45);
        }

        [data-bs-theme="light"] .divider {
            color: rgba(0, 0, 0, 0.4);
        }

        [data-bs-theme="light"] .divider::before,
        [data-bs-theme="light"] .divider::after {
            border-color: rgba(0, 0, 0, 0.1);
        }

        [data-bs-theme="light"] .social-icon {
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.1);
            color: #333;
        }

        [data-bs-theme="light"] .theme-toggle-btn {
            color: #333;
        }
    </style>
</head>

<body>

    <!-- Theme & Layout Toggles -->
    <button class="theme-toggle-btn theme-toggle-fixed">
        <i class="bi bi-moon-fill"></i>
    </button>

    <div class="container d-flex justify-content-center">
        <div class="login-card text-center text-white">
            <a href="index.html" class="d-flex align-items-center justify-content-center text-decoration-none mb-5">
                <i class="bi bi-hexagon-fill fs-3 me-2 brand-logo-icon"></i>
                <span class="brand-name mb-0">URBAN HIVE</span>
            </a>
            <h3 class="mb-2 fw-bold">Welcome Back</h3>
            <p class="opacity-75 mb-4">Access your urban apiary management.</p>

            <form action="dashboard.html" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="mb-3 text-start">
                    <label class="form-label small fw-bold opacity-75">EMAIL ADDRESS</label>
                    <input type="email" class="form-control" placeholder="name@email.com" required>
                </div>
                <div class="mb-4 text-start">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label class="form-label small fw-bold opacity-75 mb-0">PASSWORD</label>
                        <a href="#" class="forgot-password small">Forgot Password?</a>
                    </div>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-4">Login to Dashboard</button>

                <div class="divider">Or Login with</div>

                <div class="social-icons">
                    <a href="#" class="social-icon">
                        <i class="bi bi-facebook"></i>
                    </a>
                    <a href="#" class="social-icon">
                        <i class="bi bi-google"></i>
                    </a>
                    <a href="#" class="social-icon">
                        <i class="bi bi-twitter"></i>
                    </a>
                </div>

                <p class="small opacity-75 mt-4">Don't have an account? <a href="register.html"
                        class="text-primary fw-bold text-decoration-none">Sign up</a></p>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
